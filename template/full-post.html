  <body>
    <header class="whole-header">
      <div class="toggle-header">
        <!-- Sun icon -->
        <div class="whole-toggle">
          <!-- 
          Display following text if user it's browser doesn't allow JS
           -->
          <noscript>
            Toggle light-dark-mode not shown, your browsers doesn't supper
            JavaScript.
          </noscript>
          <svg
            class="toggle-sun"
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"
            />
          </svg>

          <!-- Toggle wrapper + toggle knob -->
          <div class="toggle-wrapper">
            <div class="toggle-knob"></div>
          </div>

          <!-- Moon icon -->
          <svg
            class="toggle-moon"
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
